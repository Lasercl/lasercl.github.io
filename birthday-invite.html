<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Invite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/c9663cd471.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Outfit', 'sans-serif'] },
            colors: { primary: '#6d28d9', secondary: '#1e1b4b' }
          }
        }
      }
    </script>

    <style>
      body { margin: 0; overflow-x: hidden; background-color: #000; color: #fff; }
      #bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; }
      .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
      
      /* Flip Card CSS */
      .flip-card {
        background-color: transparent;
        width: 350px;
        height: 450px;
        perspective: 1000px; /* Remove this if you don't want the 3D effect */
      }
      .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.8s;
        transform-style: preserve-3d;
      }
      .flip-card:hover .flip-card-inner {
        transform: rotateY(180deg);
      }
      .flip-card-front, .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden; /* Safari */
        backface-visibility: hidden;
        border-radius: 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px -10px rgba(109, 40, 217, 0.5);
      }
      .flip-card-back {
        transform: rotateY(180deg);
        background: linear-gradient(145deg, rgba(109,40,217,0.2) 0%, rgba(255,255,255,0.01) 100%);
        border-color: rgba(109, 40, 217, 0.5);
      }
      .glow-text { text-shadow: 0 0 20px rgba(109, 40, 217, 0.8); }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="antialiased selection:bg-primary selection:text-white flex flex-col min-h-screen">
    <canvas id="bg"></canvas>

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass transition-all duration-300" id="navbar">
      <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="./index.html" class="text-2xl font-bold tracking-wider text-white glow-text">LCL</a>
        <div class="hidden md:flex space-x-8 items-center">
          <a href="./index.html" class="text-gray-300 hover:text-white transition-colors">Home</a>
          <a href="./project.html" class="text-gray-300 hover:text-white transition-colors">Projects</a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center pt-24 px-6 pb-12">
      <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-bold glow-text mb-2">Birthday Invitation</h1>
        <p class="text-gray-400">Hover the card to flip it!</p>
      </div>

      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <i class="fa-solid fa-cake-candles text-6xl text-primary mb-6 glow-text"></i>
            <h1 class="text-4xl font-bold mb-4">My Birthday!</h1>
            <p class="text-gray-400">You are invited to celebrate</p>
          </div>
          <div class="flip-card-back">
            <i class="fa-regular fa-calendar-check text-5xl text-white mb-6"></i>
            <h2 class="text-3xl font-bold mb-4">On the 26th December</h2>
            <p class="text-purple-200">Save the date and get ready for a fun party!</p>
          </div>
        </div>
      </div>
      
      <div class="mt-12">
        <a href="./index.html" class="px-6 py-3 glass hover:bg-white/10 text-white rounded-full font-medium transition-all">
          <i class="fa-solid fa-arrow-left mr-2"></i> Back to Portfolio
        </a>
      </div>
    </main>

    <!-- Three.js Setup -->
    <script type="module">
      import * as THREE from 'three';
      const canvas = document.querySelector('#bg');
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000000, 0.001);
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.position.z = 30;

      const group = new THREE.Group();
      scene.add(group);

      const particleGeometry = new THREE.BufferGeometry();
      const particleCount = 2000;
      const posArray = new Float32Array(particleCount * 3);
      for(let i=0; i < particleCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 150;
      }
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
      const particleMaterial = new THREE.PointsMaterial({ size: 0.2, color: 0x8b5cf6, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
      const particlesMesh = new THREE.Points(particleGeometry, particleMaterial);
      group.add(particlesMesh);

      const torus = new THREE.Mesh(
        new THREE.TorusKnotGeometry(10, 3, 100, 16),
        new THREE.MeshBasicMaterial({ color: 0x6d28d9, wireframe: true, transparent: true, opacity: 0.15 })
      );
      torus.position.set(20, 0, -20);
      group.add(torus);

      const torus2 = new THREE.Mesh(
        new THREE.TorusKnotGeometry(8, 2, 80, 16),
        new THREE.MeshBasicMaterial({ color: 0x4c1d95, wireframe: true, transparent: true, opacity: 0.1 })
      );
      torus2.position.set(-25, 10, -30);
      group.add(torus2);

      let mouseX = 0; let mouseY = 0; let targetX = 0; let targetY = 0;
      const windowHalfX = window.innerWidth / 2; const windowHalfY = window.innerHeight / 2;
      document.addEventListener('mousemove', (event) => { mouseX = (event.clientX - windowHalfX); mouseY = (event.clientY - windowHalfY); });

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();
        group.rotation.y = elapsedTime * 0.05;
        torus.rotation.x += 0.005; torus.rotation.y += 0.005;
        torus2.rotation.x -= 0.003; torus2.rotation.z += 0.004;
        targetX = mouseX * 0.001; targetY = mouseY * 0.001;
        particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
        particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
